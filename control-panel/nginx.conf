server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the sensor container so the browser never does cross-origin requests
    location /sensor {
        proxy_pass         http://172.20.0.20:8000/sensor;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        add_header         Access-Control-Allow-Origin *;
    }

    location /health {
        proxy_pass http://172.20.0.20:8000/health;
    }
}
